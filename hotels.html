<!DOCTYPE html>
<html lang="uk">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Готелі</title>

    <link rel="stylesheet" href="catalog.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

    <div class="header-content">

        <h1 id="title">Готелі</h1>

        <p>Оберіть готель для свого відпочинку</p>

        <nav class="nav">

            <a href="catalog.html">
                <i class="fa fa-arrow-left"></i>
                Назад до каталогу
            </a>

        </nav>

    </div>

</header>

<section>

    <div id="catalog" class="catalog"></div>

</section>


<div id="bookingModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeBooking()">&times;</span>

        <h2>Бронювання готелю</h2>

        <h3 id="hotelName"></h3>

        <p><b>Країна:</b> <span id="hotelCountry"></span></p>

        <p><b>Ціна:</b> <span id="hotelPrice"></span>$</p>

        <input
            type="text"
            id="userName"
            placeholder="Ваше ім'я"
        >

        <input
            type="tel"
            id="userPhone"
            placeholder="Номер телефону"
        >

        <button onclick="confirmBooking()">
            Підтвердити бронювання
        </button>

    </div>

</div>

<script src="hotels.js"></script>

</body>
</html>
